<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>OpenClaw NEXUS Console</h1>
      <div class="right">
        <input id="token" type="password" autocomplete="off" placeholder="UI_TOKEN（已隐藏）" />
        <label class="switch"><input type="checkbox" id="autoRefresh" checked />自动刷新</label>
        <label class="switch"><input type="checkbox" id="smartRefresh" checked />空闲降频(空闲60s/执行10s)</label>
        <select id="refreshInterval" class="refresh-interval">
          <option value="10">10s</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
        </select>
        <button id="refresh">刷新</button>
      </div>
    </header>

    <main>
      <section class="panel board-panel">
        <h2>运行看板 <span id="boardTime" class="meta"></span></h2>
        <div class="kpi-grid">
          <div class="kpi" id="kpi-card-openclaw"><span>OpenClaw</span><strong id="kpi-openclaw">-</strong></div>
          <div class="kpi" id="kpi-card-node"><span>Node.js</span><strong id="kpi-node">-</strong></div>
          <div class="kpi" id="kpi-card-gateway"><span>Gateway</span><strong id="kpi-gateway">-</strong></div>
          <div class="kpi" id="kpi-card-sessions"><span>Sessions</span><strong id="kpi-sessions">-</strong></div>
          <div class="kpi" id="kpi-card-subagents"><span>Subagents</span><strong id="kpi-subagents">-</strong></div>
          <div class="kpi" id="kpi-card-uptime"><span>Uptime</span><strong id="kpi-uptime">-</strong></div>
          <div class="kpi" id="kpi-card-context"><span>Context</span><strong id="kpi-context">-</strong></div>
          <div class="kpi" id="kpi-card-memory"><span>Memory</span><strong id="kpi-memory">-</strong></div>
          <div class="kpi" id="kpi-card-health"><span>Health</span><strong id="kpi-health">-</strong></div>
        </div>
        <canvas id="trendCanvas" height="44"></canvas>
        <div class="board-bottom">
          <div id="alerts" class="alerts"></div>
          <div class="success-rate">命令成功率(最近50次): <strong id="successRate">-</strong></div>
        </div>
        <div class="thresholds">
          <label>Load阈值 <input id="loadWarn" type="number" min="1" step="0.1" value="8" /></label>
          <label>内存阈值% <input id="memWarn" type="number" min="1" max="100" step="1" value="85" /></label>
          <button id="saveThresholds">保存阈值</button>
        </div>
      </section>

      <section class="panel quick-panel">
        <h2>快捷命令 / 模型切换</h2>
        <div class="model-switch">
          <select id="modelSelect"></select>
          <button id="applyModel">一键切换模型</button>
        </div>
        <div id="quickCommands" class="quick-grid"></div>
      </section>

      <section class="panel terminal-panel">
        <h2>执行输出</h2>
        <div class="cmdbar"><button id="stop">停止当前命令</button></div>
        <div id="terminal"></div>
      </section>

      <section class="panel info-panel">
        <h2>状态明细</h2>
        <div class="cards two compact">
          <article><h3>Gateway</h3><pre id="gateway"></pre></article>
          <article><h3>OpenClaw</h3><pre id="claw"></pre></article>
          <article><h3>Sessions</h3><pre id="sessions"></pre></article>
          <article><h3>Subagents</h3><pre id="subagents"></pre></article>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
