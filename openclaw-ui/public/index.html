<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>OpenClaw NEXUS Console</h1>
      <div class="right">
        <input id="token" placeholder="UI_TOKEN" />
        <button id="refresh">刷新</button>
      </div>
    </header>

    <main>
      <section class="panel board-panel">
        <h2>运行看板</h2>
        <div class="kpi-grid">
          <div class="kpi"><span>OpenClaw</span><strong id="kpi-openclaw">-</strong></div>
          <div class="kpi"><span>Node.js</span><strong id="kpi-node">-</strong></div>
          <div class="kpi"><span>Gateway</span><strong id="kpi-gateway">-</strong></div>
          <div class="kpi"><span>Sessions</span><strong id="kpi-sessions">-</strong></div>
          <div class="kpi"><span>Subagents</span><strong id="kpi-subagents">-</strong></div>
        </div>
      </section>

      <section class="panel quick-panel">
        <h2>快捷命令</h2>
        <div id="quickCommands" class="quick-grid"></div>
      </section>

      <section class="panel terminal-panel">
        <h2>执行输出</h2>
        <div class="cmdbar"><button id="stop">停止当前命令</button></div>
        <div id="terminal"></div>
      </section>

      <section class="panel info-panel">
        <h2>状态明细</h2>
        <div class="cards two compact">
          <article><h3>Gateway</h3><pre id="gateway"></pre></article>
          <article><h3>OpenClaw</h3><pre id="claw"></pre></article>
          <article><h3>Sessions</h3><pre id="sessions"></pre></article>
          <article><h3>Subagents</h3><pre id="subagents"></pre></article>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
